name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish
        run: dotnet publish CCWaterControllerPlayer/CCWaterControllerPlayer.csproj -c Release -r win-x64 --self-contained true /p:PublishSingleFile=true

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build Installer
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer/setup.iss

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: CCWater Controller Player ${{ github.ref_name }}
          body: |
            ## CCWater Controller Player ${{ github.ref_name }}
            
            ### 安装说明
            下载 `CCWaterControllerPlayer-Setup-v*.exe` 运行安装即可。
            
            ### 系统要求
            - Windows 7 SP1 / Windows 10 / Windows 11 (x64)
            - 无需额外安装 .NET 运行时
          files: |
            installer/Output/CCWaterControllerPlayer-Setup-*.exe
          draft: false
          prerelease: false
